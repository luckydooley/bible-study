name: Publish Daily Bible Study

on:
  schedule:
    # 10 PM UTC = 5 PM CDT (Central Daylight) / 4 PM CST (Central Standard)
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Publish tomorrow's study from staging
        run: |
          # At 10 PM UTC, tomorrow in Central Time is +1 day in UTC
          TOMORROW=$(date -u -d "+1 day" +%Y-%m-%d)
          FILE="staging/${TOMORROW}.html"

          if [ -f "$FILE" ]; then
            echo "Publishing ${TOMORROW}.html"
            cp "$FILE" "${TOMORROW}.html"
            rm "$FILE"

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "${TOMORROW}.html"
            git add "staging/"
            git commit -m "Publish ${TOMORROW} daily study"
            git push
          else
            echo "No file found for ${TOMORROW} in staging/"
            exit 0
          fi
